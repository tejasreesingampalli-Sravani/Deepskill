<h1>{{ portalName }}</h1>

<p>
  Manage your courses, view grades and track your academic progress.
</p>

<hr>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<input
  type="text"
  placeholder="Search Course"
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>

<hr>

<h3>Statistics</h3>

<p>Courses Available: {{ courseCount }}</p>
<p>Enrolled: 3</p>
<p>GPA: 3.8</p>
