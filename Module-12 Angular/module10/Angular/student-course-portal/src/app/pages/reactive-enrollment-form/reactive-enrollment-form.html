<form
  [formGroup]="enrollForm"
  (ngSubmit)="onSubmit()">

  <label>Name</label><br>

  <input
    type="text"
    formControlName="studentName">

  <div *ngIf="enrollForm.get('studentName')?.touched &&
              enrollForm.get('studentName')?.errors?.['required']">
    Name is required
  </div>

  <div *ngIf="enrollForm.get('studentName')?.touched &&
              enrollForm.get('studentName')?.errors?.['minlength']">
    Name must be at least 3 characters
  </div>

  <br><br>

  <label>Email</label><br>

  <input
    type="email"
    formControlName="studentEmail">

  <div *ngIf="enrollForm.get('studentEmail')?.touched &&
              enrollForm.get('studentEmail')?.errors?.['required']">
    Email is required
  </div>

  <div *ngIf="enrollForm.get('studentEmail')?.touched &&
              enrollForm.get('studentEmail')?.errors?.['email']">
    Invalid email
  </div>

  <div *ngIf="enrollForm.get('studentEmail')?.touched &&
              enrollForm.get('studentEmail')?.errors?.['emailTaken']">
    Email taken
  </div>

  <br><br>

  <label>Course ID</label><br>

  <input
    type="text"
    formControlName="courseId">

  <div *ngIf="enrollForm.get('courseId')?.touched &&
              enrollForm.get('courseId')?.errors?.['required']">
    Course ID is required
  </div>

  <div *ngIf="enrollForm.get('courseId')?.touched &&
              enrollForm.get('courseId')?.errors?.['noCourseCode']">
    Course code starting with XX is not allowed.
  </div>

  <br><br>

  <label>Preferred Semester</label><br>

  <select formControlName="preferredSemester">
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>
  </select>

  <br><br>

  <label>
    <input
      type="checkbox"
      formControlName="agreeToTerms">

    Agree To Terms
  </label>

  <br><br>

  <hr>

  <h3>Additional Courses</h3>

  <button
    type="button"
    (click)="addCourse()">
    Add Another Course
  </button>

  <br><br>

  <div *ngFor="let ctrl of additionalCourses.controls; let i = index">

    <input [formControl]="$any(ctrl)">

    <button
      type="button"
      (click)="removeCourse(i)">
      Remove
    </button>

    <br><br>

  </div>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

</form>
